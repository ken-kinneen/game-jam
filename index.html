<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TRASHED</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #111;
        overflow: hidden;
      }
      #game-container {
        width: 100vw;
        height: 100vh;
      }
    </style>
  </head>
  <body>
    <div id="game-container"></div>
    <script type="module">
      function showError(err) {
        console.error('[TRASHED] boot import failed', err);
        const pre = document.createElement('pre');
        pre.style.cssText =
          'position:fixed;inset:20px;color:red;font-size:14px;z-index:9999;white-space:pre-wrap;background:#111;padding:20px;overflow:auto;';
        pre.textContent = 'MODULE LOAD FAILED:\n' + (err?.stack || err?.message || err);
        document.body.appendChild(pre);
      }

      console.log('[TRASHED] loading main.ts');
      try {
        await import('/src/main.ts');
        console.log('[TRASHED] main.ts loaded');
      } catch (err) {
        showError(err);
      }
    </script>
  </body>
</html>
